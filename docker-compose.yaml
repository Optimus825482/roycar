version: "3.9"

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: fb-career-db
    ports:
      - "15432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: ${POSTGRES_DB:-royal_careerdb}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-518518Erkan}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ${POSTGRES_DB:-royal_careerdb}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fb-career-app
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      NEXTAUTH_URL: https://royalcareer.erkanerdem.net
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-change-me-to-a-secure-random-string}
      # Yerel ile aynı: postgres / 518518Erkan / royal_careerdb (Coolify'da da bu env'leri kullanın)
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-royal_careerdb}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-518518Erkan}
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:518518Erkan@db:5432/royal_careerdb}
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

volumes:
  pgdata:
